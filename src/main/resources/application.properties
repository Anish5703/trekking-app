spring.application.name=trekking-app
server.port = 8081
server.forward-headers-strategy=framework

#Redis Caching Configuration
spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL:true}

#cache lives for 7 days in ms
spring.cache.redis.time-to-live=604800000

server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024


#Custom redirection url
#replace this with frontend api and wrap this to fetch from frontend during production
frontend.signup.confirmation.url = http://localhost:8081/api/v1/auth/signup/confirmation?token=
frontend.reset.forgot-password.confirmation.url = http://localhost:8081/api/v1/auth/forgot-password/reset/confirmation?token=

#Database Config using ENV variables injected by docker-compose
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class.name = org.postgresql.Driver
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.maximum-pool-size=20
# Batch size for hibernate
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

#runs query from /resources/data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging — logback-spring.xml owns the full config; root guard here as a safety net
logging.config=classpath:logback-spring.xml
logging.level.root=INFO
logging.level.com.example.trekking_app=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
spring.profiles.active=prod


jwt.secret=${JWT_SECRET_KEY}


#SendGrid SMTP credentials
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=${SENDGRID_MAIL_USERNAME}
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${SENDGRID_SENDER_MAIL:info@trekkingApp.com}

#Google Oauth2 configuration
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

#Facebook Oauth2 configuration
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.redirect-uri=http://localhost:8081/login/oauth2/code/facebook
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.client-name=Facebook
spring.security.oauth2.client.registration.facebook.authorization-grant-type=authorization_code
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v11.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v11.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,email
spring.security.oauth2.client.provider.facebook.user-name-attribute=id


#Dummy credentials
app.oauth.google.use-playground = ${USE_GOOGLE_PLAYGROUND}
app.oauth.google.playground.client-id= ${GOOGLE_PLAYGROUND_CLIENT_ID}

