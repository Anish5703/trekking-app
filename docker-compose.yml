services:
  db:
    image: postgis/postgis:15-3.4
    container_name: postgresql-trekking-app
    restart: no
    stop_grace_period: 30s
    stop_signal: SIGINT
    environment:
      POSTGRES_DB: trekking-app-db
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U myuser -d trekking-app-db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgAdmin:
    image: dpage/pgadmin4
    container_name: paathshala-pgadmin
    logging:
      driver: "none"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin4.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 50
      GUNICORN_ACCESS_LOGFILE: /dev/null
    ports:
      - "8082:80"
      # pgAdmin accessible on localhost:8082
          #username = myuser  , password = mypassword
    depends_on:
      - db

  app:
    build: .
    container_name: trekking-app
    depends_on:
      - db
    ports:
      - "8081:8081"
    env_file:
      - .env

volumes:
  pgdata: